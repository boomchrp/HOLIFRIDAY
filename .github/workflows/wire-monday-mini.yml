name: Wire Monday Mini
on:
  push:
    paths:
      - .github/workflows/wire-monday-mini.yml
  workflow_dispatch:
permissions:
  contents: write
jobs:
  wire:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Patch App
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path
          p=Path('holifriday-app/src/App.tsx')
          s=p.read_text()
          imp='import { MondayMini } from "./MondayMini";\n'
          marker='import React, { Component, useState, useRef, useEffect, useCallback, useMemo } from "react";\n'
          if imp not in s:
              s=s.replace(marker, marker+imp, 1)
          if 'setActiveView("calendar")' not in s:
              m='''            <button onClick={() => setActiveView("inviteTeam")} style={{ border: `1px solid ${dark ? "#2a2a4a" : "#d8dbe4"}`, background: dark ? "#1a1a2e" : "#fff", color: dark ? "#e0e0f0" : "#323338", borderRadius: 8, padding: "6px 10px", fontSize: 12, fontWeight: 800, cursor: "pointer" }}>Invite Team</button>\n'''
              b='''            <button onClick={() => setActiveView("calendar")} style={{ border: `1px solid ${dark ? "#2a2a4a" : "#d8dbe4"}`, background: dark ? "#1a1a2e" : "#fff", color: dark ? "#e0e0f0" : "#323338", borderRadius: 8, padding: "6px 10px", fontSize: 12, fontWeight: 800, cursor: "pointer" }}>Calendar</button>\n            <button onClick={() => setActiveView("timeline")} style={{ border: `1px solid ${dark ? "#2a2a4a" : "#d8dbe4"}`, background: dark ? "#1a1a2e" : "#fff", color: dark ? "#e0e0f0" : "#323338", borderRadius: 8, padding: "6px 10px", fontSize: 12, fontWeight: 800, cursor: "pointer" }}>Timeline</button>\n            <button onClick={() => setActiveView("filesActivity")} style={{ border: `1px solid ${dark ? "#2a2a4a" : "#d8dbe4"}`, background: dark ? "#1a1a2e" : "#fff", color: dark ? "#e0e0f0" : "#323338", borderRadius: 8, padding: "6px 10px", fontSize: 12, fontWeight: 800, cursor: "pointer" }}>Files</button>\n            <button onClick={() => setActiveView("automations")} style={{ border: `1px solid ${dark ? "#2a2a4a" : "#d8dbe4"}`, background: dark ? "#1a1a2e" : "#fff", color: dark ? "#e0e0f0" : "#323338", borderRadius: 8, padding: "6px 10px", fontSize: 12, fontWeight: 800, cursor: "pointer" }}>Automate</button>\n'''
              if m not in s: raise SystemExit('button marker not found')
              s=s.replace(m,m+b,1)
          if 'activeView === "calendar"' not in s:
              m='''          : activeView === "pmControl"\n          ? <SUPMControlPage boards={boards} onOpenBoard={openBoardFromUxPage} onOpenInvite={() => setActiveView("inviteTeam")} />\n          : activeView === "templates"\n'''
              r='''          : activeView === "pmControl"\n          ? <SUPMControlPage boards={boards} onOpenBoard={openBoardFromUxPage} onOpenInvite={() => setActiveView("inviteTeam")} />\n          : activeView === "calendar"\n          ? <MondayMini mode="calendar" boards={boards} onPatchBoard={patchBoardById} onOpenBoard={openBoardFromUxPage} user={authUser.displayName || authUser.email} />\n          : activeView === "timeline"\n          ? <MondayMini mode="timeline" boards={boards} onPatchBoard={patchBoardById} onOpenBoard={openBoardFromUxPage} user={authUser.displayName || authUser.email} />\n          : activeView === "filesActivity"\n          ? <MondayMini mode="files" boards={boards} onPatchBoard={patchBoardById} onOpenBoard={openBoardFromUxPage} user={authUser.displayName || authUser.email} />\n          : activeView === "automations"\n          ? <MondayMini mode="automations" boards={boards} onPatchBoard={patchBoardById} onOpenBoard={openBoardFromUxPage} user={authUser.displayName || authUser.email} />\n          : activeView === "templates"\n'''
              if m not in s: raise SystemExit('route marker not found')
              s=s.replace(m,r,1)
          p.write_text(s)
          PY
      - name: Build and commit
        shell: bash
        run: |
          cd holifriday-app
          npm install
          npm run build
          cd ..
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm --ignore-unmatch .github/workflows/wire-monday-mini.yml scripts/test_small.txt || true
          git add holifriday-app/src/App.tsx holifriday-app/src/MondayMini.tsx
          if git diff --cached --quiet; then echo no changes; exit 0; fi
          git commit -m "Wire monday-style views into app"
          git push
