name: Apply HOLIFRIDAY Simple Use Pack

on:
  push:
    paths:
      - .github/workflows/apply-simple-use-pack.yml
      - scripts/apply_simple_use_pack.py
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Apply patch
        run: python3 scripts/apply_simple_use_pack.py
      - name: Build
        working-directory: holifriday-app
        run: |
          npm install
          npm run build
      - name: Commit app changes and clean installer
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm --ignore-unmatch .github/workflows/apply-simple-use-pack.yml scripts/apply_simple_use_pack.py || true
          git add holifriday-app/src/App.tsx
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Add HOLIFRIDAY simple use pack"
          git push
