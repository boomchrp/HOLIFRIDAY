name: Apply Merged Bars
on:
  push:
    branches: [main]
    paths: [.github/workflows/apply-merged-bars.yml]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: improve-firebase-security
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: python3 tools/apply_merged_schedule_bars.py
      - working-directory: holifriday-app
        run: npm install && npm run build
      - run: |
          git config user.name ChatGPT
          git config user.email actions@github.com
          git add holifriday-app/src/App.tsx
          git diff --cached --quiet || git commit -m "Merge schedule bars"
          git push origin HEAD:improve-firebase-security
