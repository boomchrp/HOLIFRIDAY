name: Rename Kanban Label

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/rename-kanban-label.yml"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Patch visible label
        run: |
          python3 <<'PY'
          from pathlib import Path
          p = Path("holifriday-app/src/App.tsx")
          s = p.read_text(encoding="utf-8")
          old = s
          replacements = [
              ('["kanban","⬡ Kanban"]', '["kanban","⬡ Status Board"]'),
              ('["K","Kanban"]', '["K","Status Board"]'),
              ('⬡ Kanban', '⬡ Status Board'),
              ('Kanban', 'Status Board'),
              ('KANBAN', 'STATUS BOARD'),
            ]
          changed = 0
          for a, b in replacements:
              if a in s:
                  s = s.replace(a, b)
                  changed += 1
          p.write_text(s, encoding="utf-8")
          print(f"Updated {changed} Kanban label reference(s).")
          if s == old:
              print("No label changes were needed.")
          PY

      - name: Install and build
        working-directory: holifriday-app
        run: |
          npm ci || npm install
          npm run build

      - name: Commit patched app and remove workflow
        run: |
          rm -f .github/workflows/rename-kanban-label.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet; then
            git add -A
            git commit -m "Rename Kanban label to Status Board"
            git push
          else
            echo "Nothing to commit"
          fi
