name: Apply Gantt What-if

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/apply-gantt-whatif.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: improve-firebase-security
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Apply Gantt and What-if patch
        run: python3 tools/apply_gantt_whatif_simple.py

      - name: Build
        working-directory: holifriday-app
        run: |
          npm install
          npm run build

      - name: Commit and push
        run: |
          git config user.name "ChatGPT"
          git config user.email "actions@github.com"
          if git diff --quiet holifriday-app/src/App.tsx; then
            echo "No changes to commit."
            exit 0
          fi
          git add holifriday-app/src/App.tsx
          git commit -m "Add Gantt timeline and What-if simulator"
          git push origin HEAD:improve-firebase-security
